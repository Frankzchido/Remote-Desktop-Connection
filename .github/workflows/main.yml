name: RDP via Ngrok

on:
  push: {}
  workflow_dispatch: {}

jobs:
  rdp:
    runs-on: windows-latest

    steps:
      - name: Download Ngrok
        run: Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip

      - name: Extract Ngrok
        run: Expand-Archive ngrok.zip -DestinationPath .

      - name: Configure Ngrok auth token
        run: .\ngrok\ngrok.exe authtoken $Env:NGROK_AUTH_TOKEN
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
          Enable-NetFirewallRule -DisplayGroup 'Remote Desktop'
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'UserAuthentication' -Value 1

      - name: Set runneradmin password
        shell: pwsh
        run: |
          $password = ConvertTo-SecureString 'P@ssw0rd!' -AsPlainText -Force
          if (-not (Get-LocalUser -Name 'runneradmin' -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name 'runneradmin' -Password $password -PasswordNeverExpires $true
          }
          Set-LocalUser -Name 'runneradmin' -Password $password

      - name: Start Ngrok TCP tunnel and print connection info
        shell: pwsh
        run: |
          Start-Process -NoNewWindow -FilePath .\ngrok\ngrok.exe -ArgumentList 'tcp 3389'
          Write-Host 'Waiting for ngrok to register the tunnel...'
          for ($i = 0; $i -lt 12; $i++) {
            try {
              $tunnels = Invoke-RestMethod 'http://127.0.0.1:4040/api/tunnels'
              if ($tunnels.tunnels.Count -gt 0) { break }
            } catch {
              Start-Sleep -Seconds 5
            }
          }
          if (-not $tunnels -or $tunnels.tunnels.Count -eq 0) {
            throw 'Ngrok tunnel was not created in time.'
          }
          $publicUrl = $tunnels.tunnels[0].public_url
          Write-Host '========================='
          Write-Host "RDP address: $publicUrl"
          Write-Host 'Username: runneradmin'
          Write-Host 'Password: P@ssw0rd!'
          Write-Host '========================='
          Write-Host 'Keep this workflow running while you connect.'

      - name: Keep RDP session open
        run: timeout /t 3300 /nobreak
